{% extends "base.html" %}
{% block title %}Recordings – LaViewNVR{% endblock %}
{% block content %}
<h4 class="mb-4"><i class="bi bi-collection-play"></i> Recordings</h4>

{% if recordings %}
<div class="table-responsive">
  <table class="table table-dark table-striped table-hover">
    <thead>
      <tr>
        <th>File</th>
        <th>Size</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      {% for rec in recordings %}
      <tr>
        <td class="font-monospace small">{{ rec.path }}</td>
        <td>{{ rec.size_mb }} MB</td>
        <td>
          <a href="/static/recordings/{{ rec.path }}" class="btn btn-sm btn-outline-light" target="_blank">
            <i class="bi bi-play-circle"></i> Play
          </a>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% else %}
<div class="alert alert-info">No recordings yet.</div>
{% endif %}
{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}LaViewNVR{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background: #1a1a2e; color: #e0e0e0; }
    .navbar { background: #16213e !important; }
    .card { background: #0f3460; border: 1px solid #e94560; }
    .card-header { background: #e94560; color: white; }
    .badge-online { background-color: #27ae60; }
    .badge-offline { background-color: #e74c3c; }
    .camera-feed { width: 100%; border-radius: 4px; background: #000; min-height: 180px; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .dot-online { background: #27ae60; box-shadow: 0 0 6px #27ae60; }
    .dot-offline { background: #e74c3c; }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark navbar-expand-lg mb-4">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="/"><i class="bi bi-camera-video"></i> LaViewNVR</a>
      <div class="navbar-nav ms-auto">
        <a class="nav-link {% if request.url.path == '/' %}active{% endif %}" href="/">
          <i class="bi bi-grid-3x3-gap"></i> Dashboard
        </a>
        <a class="nav-link {% if request.url.path == '/recordings' %}active{% endif %}" href="/recordings">
          <i class="bi bi-collection-play"></i> Recordings
        </a>
        <a class="nav-link {% if request.url.path == '/motion' %}active{% endif %}" href="/motion">
          <i class="bi bi-activity"></i> Motion
        </a>
      </div>
    </div>
  </nav>
  <div class="container-fluid px-4">
    {% block content %}{% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</body>
</html>

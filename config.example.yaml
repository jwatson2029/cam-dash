# LaViewNVR Example Configuration
# Copy this file to config.yaml and edit to match your setup.

global:
  web_port: 8000
  web_username: admin
  web_password: changeme        # Override with NVR_WEB_PASSWORD env var
  recording_path: recordings
  motion_path: motion_events
  chunk_minutes: 60
  log_level: INFO
  log_path: logs/nvr.log
  db_path: data/cameras.db
  rediscovery_interval: 300     # seconds between subnet re-scans
  default_rtsp_username: admin
  default_rtsp_password: password123

cameras:
  # --- LaView Camera 1 (front door) ---
  - name: front_door
    ip: 192.168.1.100
    username: admin
    password: password123
    rtsp_path: /Streaming/Channels/101    # Main HD stream
    sub_rtsp_path: /Streaming/Channels/102  # Sub-stream for motion analysis
    enabled: true
    record: true
    motion_enabled: true
    motion_sensitivity: 0.5       # 0.0-1.0, higher = more sensitive
    motion_min_area: 500          # minimum pixel area to trigger
    motion_cooldown: 5            # seconds between motion events
    auto_discovered: false

  # --- LaView Camera 2 (backyard) ---
  - name: backyard
    ip: 192.168.1.101
    username: admin
    password: password123
    rtsp_path: /Streaming/Channels/101
    sub_rtsp_path: /Streaming/Channels/102
    enabled: true
    record: true
    motion_enabled: true
    motion_sensitivity: 0.7
    motion_min_area: 1000
    motion_cooldown: 10
    auto_discovered: false

# Optional MQTT settings
mqtt:
  enabled: false
  broker: 192.168.1.10
  port: 1883
  username: ""
  password: ""
  topic_prefix: nvr

# Optional notification settings
notifications:
  email_enabled: false
  smtp_host: smtp.gmail.com
  smtp_port: 587
  smtp_username: ""
  smtp_password: ""
  email_to: ""
  desktop_enabled: false

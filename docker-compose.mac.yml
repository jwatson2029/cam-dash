# macOS override for docker-compose.yml
#
# Docker Desktop for Mac does not support network_mode: host.
# Use this override file when running on macOS:
#
#   docker compose -f docker-compose.yml -f docker-compose.mac.yml up -d
#
# Camera auto-discovery (--discover) will NOT find cameras through Docker on
# macOS because Docker runs inside a Linux VM with its own network namespace.
# Add cameras manually in config.yaml instead.

services:
  laviewnvr:
    network_mode: bridge
    ports:
      - "8000:8000"
